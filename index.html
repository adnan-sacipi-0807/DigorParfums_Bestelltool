// ─── Status Logic ───
function getStatus(p) {
  if (p.not_available) return {color:"#666",bg:"#1a1a1a",label:"Nicht lieferbar",order:5};
  if (p.stock <= 0) return {color:"#dc2626",bg:"#7f1d1d",label:"Ausverkauft",order:1};
  if (p.stock <= Math.floor(p.min_stock * 0.5)) return {color:"#ef4444",bg:"#450a0a",label:"Bestellen!",order:2};
  if (p.stock <= p.min_stock) return {color:"#eab308",bg:"#422006",label:"Bald",order:3};
  return {color:"#22c55e",bg:"#052e16",label:"OK",order:4};
}

// ─── CSV Parser ───
function parseCSV(text) {
  const lines = text.split("\n").filter(l=>l.trim());
  if (lines.length < 2) return [];
  const headers = parseRow(lines[0]).map(h=>h.replace(/"/g,"").toLowerCase().trim());
  const titleIdx = headers.findIndex(h=>h==="title"||h==="product"||h==="produkt");
  const handleIdx = headers.findIndex(h=>h==="handle");
  const onHandIdx = headers.findIndex(h=>h.includes("on hand")&&h.includes("current"));
  const availIdx = onHandIdx!==-1?onHandIdx:headers.findIndex(h=>h.includes("available")||h==="verfügbar");
  if (titleIdx===-1&&handleIdx===-1) return [];
  const products = new Map();
  for (let i=1;i<lines.length;i++) {
    const row = parseRow(lines[i]);
    if (!row||row.length<2) continue;
    const name = (titleIdx!==-1?row[titleIdx]:row[handleIdx]||"").trim().replace(/"/g,"");
    if (!name||name.toLowerCase()==="refiller") continue;
    const stock = Math.max(0, availIdx!==-1?parseInt(row[availIdx])||0:0);
    const key = name.toUpperCase();
    if (products.has(key)) products.get(key).stock+=stock;
    else products.set(key,{name,stock});
  }
  return Array.from(products.values());
}

function parseRow(line) {
  const r=[]; let c="",q=false;
  for (let i=0;i<line.length;i++) {
    if (line[i]==='"') q=!q;
    else if (line[i]===","&&!q) {r.push(c.trim());c="";}
    else c+=line[i];
  }
  r.push(c.trim()); return r;
}

// ─── Supabase Operations ───
async function loadProducts() {
  const {data} = await sb.from('products').select('*').order('name');
  return data || [];
}

async function initCatalog(userId) {
  const rows = CATALOG.map(p=>({
    user_id: userId, name: p.name, inspiration: p.inspiration||"",
    category: p.category||"privée", stock: 0, min_stock: 2,
    in_sortiment: p.inSortiment||false, not_available: p.notAvailable||false,
    is_new: p.isNew||false,
  }));
  // Insert in batches of 20
  for (let i=0;i<rows.length;i+=20) {
    await sb.from('products').insert(rows.slice(i,i+20));
  }
}

async function updateProduct(id, fields) {
  await sb.from('products').update(fields).eq('id', id);
}

async function loadOrders() {
  const {data:orders} = await sb.from('orders').select('*').order('order_date',{ascending:false});
  if (!orders||!orders.length) return [];
  const ids = orders.map(o=>o.id);
  const {data:items} = await sb.from('order_items').select('*').in('order_id', ids);
  return orders.map(o=>({...o, items:(items||[]).filter(i=>i.order_id===o.id)}));
}

async function createOrder(userId, cartItems) {
  const {data:order} = await sb.from('orders').insert({user_id:userId,status:'bestellt'}).select().single();
  if (!order) return null;
  const rows = cartItems.map(i=>({order_id:order.id,name:i.name,qty:i.orderQty}));
  await sb.from('order_items').insert(rows);
  return order;
}

async function updateOrderItem(itemId, fields) {
  await sb.from('order_items').update(fields).eq('id', itemId);
}

async function updateOrder(orderId, fields) {
  await sb.from('orders').update(fields).eq('id', orderId);
}

async function deleteOrder(orderId) {
  await sb.from('orders').delete().eq('id', orderId);
}

async function loadSettings(userId) {
  const {data} = await sb.from('settings').select('*').eq('user_id',userId).single();
  return data;
}

async function saveSettings(userId, s) {
  const {data:existing} = await sb.from('settings').select('id').eq('user_id',userId).single();
  if (existing) await sb.from('settings').update(s).eq('user_id',userId);
  else await sb.from('settings').insert({user_id:userId,...s});
}

  let m = `Bonjour,\n\nNouvelle commande DigorParfums (${d}) :\n\n`;
  items.forEach(i=>{m+=`• ${i.name} : ${i.orderQty} pcs\n`;});

  return `https://wa.me/${phone.replace(/[^0-9]/g,"")}?text=${encodeURIComponent(m)}`;

    if (error.message.includes("Invalid login")) {
      const {data:d2,error:e2} = await sb.auth.signUp({email:state.loginEmail,password:state.loginPassword});
      if (e2) { setState({loginError:e2.message,loginLoading:false}); return; }
      if (d2.user) { await initApp(d2.user); return; }
    }
    setState({loginError:error.message,loginLoading:false}); return;
  }
  if (data.user) await initApp(data.user);
}

async function handleLogout() {
  await sb.auth.signOut();
  setState({user:null,products:[],orders:[],loading:false});
}

async function initApp(user) {
  setState({user, loading:true});
  let products = await loadProducts();
  if (!products.length) {
    await initCatalog(user.id);
    products = await loadProducts();
  }
  const orders = await loadOrders();
  const settings = await loadSettings(user.id);
  setState({
    products, orders, loading:false, loginLoading:false,
    settings: settings || state.settings,
  });
}

// ─── Event Handlers ───
async function handleCSVImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const text = await file.text();
  const parsed = parseCSV(text);
  if (!parsed.length) { alert("Keine Produkte im CSV gefunden."); return; }
  let count = 0;
  for (const csv of parsed) {
    const key = csv.name.toUpperCase();
    const ex = state.products.find(p=>p.name.toUpperCase()===key);
    if (ex) {
      await updateProduct(ex.id, {stock:csv.stock, in_sortiment:true});
      ex.stock = csv.stock; ex.in_sortiment = true; count++;
    }
  }
  setState({products:[...state.products]});
  alert(`${count} Produkte aktualisiert.`);
  e.target.value = "";
}

async function handleStockChange(id, delta) {
  const p = state.products.find(x=>x.id===id);
  if (!p) return;
  const newStock = Math.max(0, p.stock + delta);
  p.stock = newStock;
  setState({products:[...state.products]});
  await updateProduct(id, {stock:newStock});
}

async function handleMinStockSave(id, val) {
  const v = Math.max(0, parseInt(val)||0);
  const p = state.products.find(x=>x.id===id);
  if (p) { p.min_stock = v; setState({products:[...state.products],editingMin:null}); }
  await updateProduct(id, {min_stock:v});
}

async function handleToggleAvail(id) {
  const p = state.products.find(x=>x.id===id);
  if (!p) return;
  p.not_available = !p.not_available;
  setState({products:[...state.products]});
  await updateProduct(id, {not_available:p.not_available});
}

async function handleAddToSortiment(id) {
  const p = state.products.find(x=>x.id===id);
  if (!p) return;
  p.in_sortiment = true; p.is_new = false;
  setState({products:[...state.products]});
  await updateProduct(id, {in_sortiment:true, is_new:false});
}

function toggleCart(id) {
  const cart = {...state.cart};
  if (cart[id]) { delete cart[id]; }
  else {
    const p = state.products.find(x=>x.id===id);
    cart[id] = Math.max(1, (p?.min_stock||2) - Math.max(0, p?.stock||0));
  }
  setState({cart});
}

function setCartQty(id, q) {
  setState({cart:{...state.cart,[id]:Math.max(1,parseInt(q)||1)}});
}

function autoFillCart() {
  const cart = {};
  state.products.filter(p=>p.in_sortiment&&!p.not_available).forEach(p=>{
    const s = getStatus(p);
    if (s.order<=2) cart[p.id] = Math.max(1, (p.min_stock||2) - p.stock);
  });
  setState({cart});
}

async function sendOrder() {
  const items = getCartItems();
  if (!items.length) return;
  if (!state.settings.lieferant_phone) { alert("Bitte WhatsApp-Nummer in Einstellungen hinterlegen."); return; }
  const url = whatsappURL(state.settings.lieferant_phone, items);
  await createOrder(state.user.id, items);
  const orders = await loadOrders();
  window.open(url, "_blank");
  setState({cart:{},orders,sent:true});
  setTimeout(()=>setState({sent:false}), 2000);
}

function getCartItems() {
  return Object.entries(state.cart).map(([id,qty])=>{
    const p = state.products.find(x=>String(x.id)===String(id));
    return p ? {...p, orderQty:qty} : null;
  }).filter(Boolean);
}

async function handleToggleOrderItem(orderId, itemId, field) {
  const o = state.orders.find(x=>x.id===orderId);
  if (!o) return;
  const item = o.items.find(x=>x.id===itemId);
  if (!item) return;
  item[field] = !item[field];
  await updateOrderItem(itemId, {[field]:item[field]});
  const allDone = o.items.every(i=>i.received||i.not_available);
  if (allDone !== (o.status==="erledigt")) {
    o.status = allDone ? "erledigt" : "bestellt";
    await updateOrder(orderId, {status:o.status});
  }
  setState({orders:[...state.orders]});
}

async function handleDeleteOrder(orderId) {
  if (!confirm("Bestellung löschen?")) return;
  await deleteOrder(orderId);
  setState({orders:state.orders.filter(o=>o.id!==orderId)});
}

async function handleSaveSettings() {
  await saveSettings(state.user.id, state.settings);
  alert("Gespeichert!");
}

async function handleResetAll() {
  if (!confirm("Alle Produkte und Bestellungen löschen und neu laden?")) return;
  await sb.from('order_items').delete().in('order_id', state.orders.map(o=>o.id));
  await sb.from('orders').delete().eq('user_id', state.user.id);
  await sb.from('products').delete().eq('user_id', state.user.id);
  await initCatalog(state.user.id);
  const products = await loadProducts();
  setState({products, orders:[], cart:{}});
}

function handleExportCSV() {
  const csv = ["Produktname,Inspiration,Kategorie,Lagerbestand,Mindestbestand,Im Sortiment,Nicht lieferbar"]
    .concat(state.products.map(p=>`"${p.name}","${p.inspiration||''}","${p.category||''}",${p.stock},${p.min_stock},${p.in_sortiment?'ja':'nein'},${p.not_available?'ja':'nein'}`)).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download = `DigorParfums_Katalog_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  else if (state.tab==="historie") content = renderHistorie();

  const emailEl = $('#loginEmail');
  const passEl = $('#loginPassword');
  const btnEl = $('#loginBtn');
  if (emailEl) emailEl.addEventListener('input', e=>state.loginEmail=e.target.value);
  if (passEl) passEl.addEventListener('input', e=>state.loginPassword=e.target.value);
  if (passEl) passEl.addEventListener('keydown', e=>{if(e.key==='Enter')handleLogin();});
  if (btnEl) btnEl.addEventListener('click', handleLogin);
}

// ─── Init ───
async function init() {
  const {data:{session}} = await sb.auth.getSession();
  if (session?.user) { await initApp(session.user); }
  else { setState({loading:false}); }
}

init();
</script>
